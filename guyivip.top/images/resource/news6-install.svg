<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#1a1a1a"/>
  <text x="300" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#00ff00" text-anchor="middle">Terminal</text>
  <rect x="20" y="80" width="560" height="300" fill="#0d1117" rx="8"/>
  <text x="40" y="120" font-family="Monaco, Consolas, monospace" font-size="14" fill="#00ff00">$ curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash</text>
  <text x="40" y="150" font-family="Monaco, Consolas, monospace" font-size="14" fill="#ffffff">Downloading Hermes Agent...</text>
  <text x="40" y="180" font-family="Monaco, Consolas, monospace" font-size="14" fill="#ffffff">Installing dependencies...</text>
  <text x="40" y="210" font-family="Monaco, Consolas, monospace" font-size="14" fill="#00ff00">✓ Installation complete!</text>
  <text x="40" y="250" font-family="Monaco, Consolas, monospace" font-size="14" fill="#00ff00">$ hermes</text>
  <text x="40" y="280" font-family="Monaco, Consolas, monospace" font-size="14" fill="#ffffff">Hermes Agent v1.0.0</text>
  <text x="40" y="310" font-family="Monaco, Consolas, monospace" font-size="14" fill="#ffffff">Ready to chat!</text>
</svg>