<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>交易 - ShareSim</title>
  <meta name="app-base" content="/">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="apple-container container">
      <a class="navbar-brand app-link" data-file="dashboard.html" href="dashboard.html">ShareSim</a>
      <ul class="navbar-nav">
        <li><a class="nav-link app-link" data-file="dashboard.html" href="dashboard.html">Dashboard</a></li>
        <li><a class="nav-link app-link" data-file="trade.html" href="trade.html">Trade</a></li>
        <li><a class="nav-link app-link" data-file="portfolio.html" href="portfolio.html">Portfolio</a></li>
        <li><a class="nav-link app-link" data-file="transactions.html" href="transactions.html">Transactions</a></li>
        <li><a class="nav-link" href="#" id="logout-btn">Sign Out</a></li>
      </ul>
    </div>
  </nav>

  <div class="section-light" style="min-height: calc(100vh - 48px);">
    <div class="apple-container">
      
      <div id="alertBox" class="body-text text-danger text-center mb-4 d-none" style="padding: 16px; border: 1px solid #ff3b30; border-radius: 8px;"></div>
      
      <div class="d-flex gap-3" style="flex-wrap: wrap;">
        
        <!-- Watchlist -->
        <div class="apple-card" style="flex: 1; min-width: 250px;">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="card-title" style="margin: 0;">自选 (Watchlist)</h2>
            <button id="btnAddWatch" class="btn-apple-pill" style="padding: 4px 12px; font-size: 12px;">+ Add</button>
          </div>
          <div id="watchlist" style="display: flex; flex-direction: column; gap: 8px;"></div>
        </div>
        
        <!-- Chart -->
        <div class="apple-card" style="flex: 3; min-width: 400px; padding: 0; overflow: hidden;">
          <div class="d-flex justify-content-between align-items-center" style="padding: 16px 24px; border-bottom: 1px solid rgba(0,0,0,0.1);">
            <h2 class="card-title" style="margin: 0;">图表 (Chart)</h2>
            <div class="d-flex gap-2">
              <button id="btnLoadDay" class="btn-apple-pill" data-range="200" style="padding: 4px 12px; font-size: 12px;">200 Days</button>
              <button id="btnLoad50" class="btn-apple-pill" data-range="50" style="padding: 4px 12px; font-size: 12px;">50 Days</button>
            </div>
          </div>
          <div id="chartContainer" style="border-radius: 0;"></div>
          <div class="text-end text-muted" style="padding: 8px 16px; font-size: 12px;">
            <a href="https://www.tradingview.com/" target="_blank" rel="noopener" class="apple-link" style="font-size: 12px;">Charts by TradingView</a>
          </div>
        </div>

        <!-- Trade Panel -->
        <div class="apple-card" style="flex: 1; min-width: 250px;">
          <h2 class="card-title mb-4">交易 (Trade)</h2>
          
          <div class="mb-3">
            <label class="body-emphasis text-muted" style="display: block; margin-bottom: 8px;">代码 (Symbol)</label>
            <input id="inputTsCode" class="apple-input" placeholder="e.g. 000001.SZ">
          </div>
          
          <div class="mb-3">
            <label class="body-emphasis text-muted" style="display: block; margin-bottom: 8px;">股数 (Shares)</label>
            <input id="inputShares" type="number" step="0.01" class="apple-input" placeholder="Quantity">
          </div>
          
          <div class="d-flex align-items-center justify-content-between mb-4">
            <button id="btnQuote" class="btn-apple-pill">查价 (Quote)</button>
            <span id="labelQuote" class="body-emphasis">--</span>
          </div>
          
          <div class="d-flex gap-2">
            <button id="btnBuy" class="btn-apple-primary" style="flex: 1;">买入 (Buy)</button>
            <button id="btnSell" class="btn-apple-primary" style="flex: 1; background-color: #ff3b30;">卖出 (Sell)</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <script src="js/common.js"></script>
  <script src="js/trade.js"></script>
</body>
</html>
