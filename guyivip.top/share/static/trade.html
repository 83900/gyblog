<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>交易 - ShareSim</title>
  <meta name="app-base" content="/">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold app-link" data-file="dashboard.html" href="/dashboard.html">ShareSim</a>
      <div class="ms-auto d-flex align-items-center gap-3">
        <a class="nav-link text-light app-link" data-file="dashboard.html" href="/dashboard.html">概览</a>
        <a class="nav-link text-light app-link" data-file="portfolio.html" href="/portfolio.html">持仓</a>
        <a class="nav-link text-light app-link" data-file="transactions.html" href="/transactions.html">流水</a>
        <button id="logout-btn" class="btn btn-outline-light btn-sm">退出</button>
      </div>
    </div>
  </nav>
  <div class="container py-4">
    <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>
    <div class="row g-3">
      <div class="col-xl-3">
        <div class="card shadow-sm h-100">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-bold">自选</span>
            <button id="btnAddWatch" class="btn btn-sm btn-outline-secondary">添加当前</button>
          </div>
          <div class="list-group list-group-flush" id="watchlist"></div>
        </div>
      </div>
      <div class="col-xl-6">
        <div class="card shadow-sm h-100">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-bold">图表</span>
            <div class="d-flex gap-2">
              <button id="btnLoadDay" class="btn btn-sm btn-outline-secondary" data-range="200">日K</button>
              <button id="btnLoad50" class="btn btn-sm btn-outline-secondary" data-range="50">近50</button>
            </div>
          </div>
          <div class="card-body p-0">
            <div id="chartContainer" style="width: 100%; height: 420px;"></div>
            <div class="text-end small text-muted px-2 py-1"><a href="https://www.tradingview.com/" target="_blank" rel="noopener">Charts by TradingView</a></div>
          </div>
        </div>
      </div>
      <div class="col-xl-3">
        <div class="card shadow-sm h-100">
          <div class="card-header fw-bold">交易</div>
          <div class="card-body">
            <div class="mb-3">
              <label class="form-label">代码 ts_code</label>
              <input id="inputTsCode" class="form-control" placeholder="如 000001.SZ">
            </div>
            <div class="mb-3">
              <label class="form-label">股数</label>
              <input id="inputShares" type="number" step="0.01" class="form-control" placeholder="输入股数">
            </div>
            <div class="d-flex align-items-center gap-2 mb-3">
              <button id="btnQuote" class="btn btn-outline-secondary">查价</button>
              <span id="labelQuote" class="fw-bold"></span>
            </div>
            <div class="d-grid gap-2">
              <button id="btnBuy" class="btn btn-primary">买入</button>
              <button id="btnSell" class="btn btn-danger">卖出</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <script src="/static/js/common.js"></script>
  <script src="/static/js/trade.js"></script>
</body>
</html>
