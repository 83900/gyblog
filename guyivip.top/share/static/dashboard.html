<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>概览 - ShareSim</title>
  <meta name="app-base" content="/">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg ">
    <div class="container">
      <a class="navbar-brand fw-bold app-link" data-file="dashboard.html" href="/dashboard.html">ShareSim</a>
      <div class="ms-auto d-flex align-items-center gap-3">
        <a class="nav-link  app-link" data-file="trade.html" href="/trade.html">交易</a>
        <a class="nav-link  app-link" data-file="portfolio.html" href="/portfolio.html">持仓</a>
        <a class="nav-link  app-link" data-file="transactions.html" href="/transactions.html">流水</a>
        <button id="logout-btn" class="btn btn-outline-primary btn-sm">退出</button>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <div class="hero-section mt-5 pt-5">
    <h1>Your Portfolio. Reimagined.</h1>
    <p>Track your assets, analyze market trends, and trade seamlessly in one beautiful interface.</p>
  </div>

  <div class="container py-4">
    <div class="row g-3 mb-3">
      <div class="col-md-4">
        <div class="card shadow-sm h-100"><div class="card-body d-flex justify-content-between align-items-center"><div><div class="text-muted small">现金</div><div id="kpiCash" class="fs-4 fw-bold">--</div></div><i class="bi bi-wallet2 fs-2 text-primary"></i></div></div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm h-100"><div class="card-body d-flex justify-content-between align-items-center"><div><div class="text-muted small">持仓市值</div><div id="kpiMV" class="fs-4 fw-bold">--</div></div><i class="bi bi-graph-up fs-2 text-success"></i></div></div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm h-100"><div class="card-body d-flex justify-content-between align-items-center"><div><div class="text-muted small">浮动盈亏</div><div id="kpiPNL" class="fs-4 fw-bold">--</div></div><i class="bi bi-cash-coin fs-2 text-warning"></i></div></div>
      </div>
    </div>
    <div class="row g-3">
      <div class="col-lg-6">
        <div class="card shadow-sm">
          <div class="card-header fw-bold d-flex justify-content-between align-items-center">最近持仓<a class="btn btn-sm btn-outline-primary app-link" data-file="portfolio.html" href="/portfolio.html">查看全部</a></div>
          <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
              <thead class="table-light"><tr><th>名称/代码</th><th class="text-end">股数</th><th class="text-end">均价</th><th class="text-end">估值</th><th class="text-end">盈亏</th></tr></thead>
              <tbody id="dashHoldings"></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card shadow-sm">
          <div class="card-header fw-bold d-flex justify-content-between align-items-center">最近流水<a class="btn btn-sm btn-outline-primary app-link" data-file="transactions.html" href="/transactions.html">查看全部</a></div>
          <div class="table-responsive">
            <table class="table table-striped mb-0 align-middle">
              <thead class="table-light"><tr><th>时间</th><th>方向</th><th>名称/代码</th><th class="text-end">价格</th><th class="text-end">股数</th></tr></thead>
              <tbody id="dashTx"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/common.js"></script>
  <script src="/static/js/dashboard.js"></script>
  </body>
</html>
