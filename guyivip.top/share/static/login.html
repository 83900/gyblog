<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - ShareSim</title>
  <meta name="app-base" content="/">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="apple-container container">
      <a class="navbar-brand app-link" data-file="dashboard.html" href="dashboard.html">ShareSim</a>
      <ul class="navbar-nav">
        <li><a class="nav-link app-link" data-file="login.html" href="login.html">Sign In</a></li>
      </ul>
    </div>
  </nav>

  <div class="section-dark" style="min-height: calc(100vh - 48px); display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <div class="apple-container" style="max-width: 400px; width: 100%;">
      <div class="text-center mb-4">
        <h1 class="hero-title">Sign in.</h1>
        <p class="body-text text-muted">Use your ShareSim Account.</p>
      </div>

      <div class="d-flex justify-content-between mb-4" style="border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 16px;">
        <button class="btn-apple-pill" id="tab-login" onclick="document.getElementById('login-form').style.display='block'; document.getElementById('register-form').style.display='none';">Sign In</button>
        <button class="btn-apple-pill" id="tab-register" onclick="document.getElementById('login-form').style.display='none'; document.getElementById('register-form').style.display='block';">Create Account</button>
      </div>

      <div class="apple-card" id="login-form" style="background-color: var(--apple-card-dark);">
        <input id="login-username" class="apple-input" placeholder="用户名" style="background-color: #1d1d1f; color: white;">
        <input id="login-password" type="password" class="apple-input" placeholder="密码" style="background-color: #1d1d1f; color: white;">
        <button id="login-btn" class="btn-apple-primary" style="width: 100%; text-align: center;">Sign In</button>
      </div>

      <div class="apple-card" id="register-form" style="display: none; background-color: var(--apple-card-dark);">
        <input id="reg-username" class="apple-input" placeholder="设置用户名" style="background-color: #1d1d1f; color: white;">
        <input id="reg-password" type="password" class="apple-input" placeholder="设置密码" style="background-color: #1d1d1f; color: white;">
        <input id="reg-cash" type="number" class="apple-input" placeholder="初始资金 (如 100000)" style="background-color: #1d1d1f; color: white;">
        <button id="reg-btn" class="btn-apple-primary" style="width: 100%; text-align: center;">Create Account</button>
      </div>
      
      <div id="alertBox" class="body-text text-danger text-center mt-4 d-none" style="padding: 16px; border: 1px solid #ff3b30; border-radius: 8px;"></div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
