<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - ShareSim</title>
  <meta name="app-base" content="/">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold app-link" data-file="dashboard.html" href="/dashboard.html">ShareSim</a>
    </div>
  </nav>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <ul class="nav nav-tabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#loginTab" type="button">登录</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#registerTab" type="button">注册</button>
          </li>
        </ul>
        <div class="tab-content border border-top-0 rounded-bottom p-4 bg-white shadow-sm">
          <div class="tab-pane fade show active" id="loginTab">
            <div class="mb-3">
              <label class="form-label">用户名</label>
              <input id="login-username" class="form-control" placeholder="输入用户名">
            </div>
            <div class="mb-3">
              <label class="form-label">密码</label>
              <input id="login-password" type="password" class="form-control" placeholder="输入密码">
            </div>
            <button id="login-btn" class="btn btn-primary w-100">登录</button>
          </div>
          <div class="tab-pane fade" id="registerTab">
            <div class="mb-3">
              <label class="form-label">用户名</label>
              <input id="reg-username" class="form-control" placeholder="设置用户名">
            </div>
            <div class="mb-3">
              <label class="form-label">密码</label>
              <input id="reg-password" type="password" class="form-control" placeholder="设置密码">
            </div>
            <div class="mb-3">
              <label class="form-label">初始资金</label>
              <input id="reg-cash" type="number" class="form-control" placeholder="例如 100000">
            </div>
            <button id="reg-btn" class="btn btn-success w-100">注册并登录</button>
          </div>
        </div>
        <div id="alertBox" class="alert alert-danger d-none mt-3" role="alert"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/common.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>
