<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - ShareSim</title>
  <meta name="app-base" content="/">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand fw-bold app-link" data-file="dashboard.html" href="/dashboard.html">ShareSim</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-header">
      <h1>Sign in.</h1>
      <p class="text-muted">Use your ShareSim Account.</p>
    </div>

    <ul class="nav nav-pills justify-content-center mb-4" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active rounded-pill px-4" data-bs-toggle="tab" data-bs-target="#loginTab" type="button">登录</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link rounded-pill px-4" data-bs-toggle="tab" data-bs-target="#registerTab" type="button">注册新账户</button>
      </li>
    </ul>

    <div class="card p-4">
      <div class="tab-content">
        <div class="tab-pane fade show active" id="loginTab">
          <div class="mb-3">
            <input id="login-username" class="form-control form-control-lg" placeholder="用户名">
          </div>
          <div class="mb-4">
            <input id="login-password" type="password" class="form-control form-control-lg" placeholder="密码">
          </div>
          <button id="login-btn" class="btn btn-primary btn-lg w-100 rounded-pill">登录</button>
        </div>

        <div class="tab-pane fade" id="registerTab">
          <div class="mb-3">
            <input id="reg-username" class="form-control form-control-lg" placeholder="设置用户名">
          </div>
          <div class="mb-3">
            <input id="reg-password" type="password" class="form-control form-control-lg" placeholder="设置密码">
          </div>
          <div class="mb-4">
            <input id="reg-cash" type="number" class="form-control form-control-lg" placeholder="初始资金 (如 100000)">
          </div>
          <button id="reg-btn" class="btn btn-primary btn-lg w-100 rounded-pill">注册并登录</button>
        </div>
      </div>
    </div>
    
    <div id="alertBox" class="alert alert-danger d-none mt-3 rounded-4" role="alert"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/common.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>
