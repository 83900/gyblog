<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>流水 - ShareSim</title>
  <meta name="app-base" content="/">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="apple-container container">
      <a class="navbar-brand app-link" data-file="dashboard.html" href="dashboard.html">ShareSim</a>
      <ul class="navbar-nav">
        <li><a class="nav-link app-link" data-file="dashboard.html" href="dashboard.html">Dashboard</a></li>
        <li><a class="nav-link app-link" data-file="trade.html" href="trade.html">Trade</a></li>
        <li><a class="nav-link app-link" data-file="portfolio.html" href="portfolio.html">Portfolio</a></li>
        <li><a class="nav-link app-link" data-file="transactions.html" href="transactions.html">Transactions</a></li>
        <li><a class="nav-link" href="#" id="logout-btn">Sign Out</a></li>
      </ul>
    </div>
  </nav>

  <div class="section-dark text-center" style="padding-top: 120px; padding-bottom: 80px;">
    <div class="apple-container">
      <h1 class="hero-title">Transactions</h1>
      <p class="sub-heading text-muted" style="max-width: 600px; margin: 0 auto 32px auto;">
        History of your trades.
      </p>
    </div>
  </div>

  <div class="section-light">
    <div class="apple-container">
      
      <div class="apple-card">
        <h2 class="card-title mb-4">交易流水 (Trade History)</h2>
        <div style="overflow-x: auto;">
          <table class="apple-table">
            <thead>
              <tr>
                <th>时间 (Time)</th>
                <th>方向 (Side)</th>
                <th>代码 (Symbol)</th>
                <th class="text-end">价格 (Price)</th>
                <th class="text-end">股数 (Shares)</th>
              </tr>
            </thead>
            <tbody id="txBody"></tbody>
          </table>
        </div>
      </div>
      
    </div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/transactions.js"></script>
</body>
</html>
