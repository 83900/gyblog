<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>持仓 - ShareSim</title>
  <meta name="app-base" content="/">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="apple-container container">
      <a class="navbar-brand app-link" data-file="dashboard.html" href="dashboard.html">ShareSim</a>
      <ul class="navbar-nav">
        <li><a class="nav-link app-link" data-file="dashboard.html" href="dashboard.html">Dashboard</a></li>
        <li><a class="nav-link app-link" data-file="trade.html" href="trade.html">Trade</a></li>
        <li><a class="nav-link app-link" data-file="portfolio.html" href="portfolio.html">Portfolio</a></li>
        <li><a class="nav-link app-link" data-file="transactions.html" href="transactions.html">Transactions</a></li>
        <li><a class="nav-link" href="#" id="logout-btn">Sign Out</a></li>
      </ul>
    </div>
  </nav>

  <div class="section-dark text-center" style="padding-top: 120px; padding-bottom: 80px;">
    <div class="apple-container">
      <h1 class="hero-title">Portfolio</h1>
      <p class="sub-heading text-muted" style="max-width: 600px; margin: 0 auto 32px auto;">
        View your current holdings.
      </p>
    </div>
  </div>

  <div class="section-light">
    <div class="apple-container">
      
      <div id="alertBox" class="body-text text-danger text-center mb-4 d-none" style="padding: 16px; border: 1px solid #ff3b30; border-radius: 8px;"></div>
      
      <div class="apple-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="d-flex align-items-center gap-3">
            <h2 class="card-title" style="margin: 0;">持仓明细 (Holdings)</h2>
            <button id="btnRefreshValuation" class="btn-apple-pill" style="padding: 4px 12px; font-size: 12px;">Refresh Valuation</button>
          </div>
          <div class="body-text text-muted" style="font-size: 12px;">双击代码跳转交易</div>
        </div>
        <div style="overflow-x: auto;">
          <table class="apple-table">
            <thead>
              <tr>
                <th>名称/代码</th>
                <th class="text-end">股数</th>
                <th class="text-end">均价</th>
                <th class="text-end">最新价</th>
                <th class="text-end">市值</th>
                <th class="text-end">盈亏</th>
              </tr>
            </thead>
            <tbody id="holdingsBody"></tbody>
          </table>
        </div>
      </div>
      
    </div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/portfolio.js"></script>
</body>
</html>
