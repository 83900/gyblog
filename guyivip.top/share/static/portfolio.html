<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>持仓 - ShareSim</title>
  <meta name="app-base" content="/">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold app-link" data-file="dashboard.html" href="/dashboard.html">ShareSim</a>
      <div class="ms-auto d-flex align-items-center gap-3">
        <a class="nav-link text-light app-link" data-file="dashboard.html" href="/dashboard.html">概览</a>
        <a class="nav-link text-light app-link" data-file="trade.html" href="/trade.html">交易</a>
        <a class="nav-link text-light app-link" data-file="transactions.html" href="/transactions.html">流水</a>
        <button id="logout-btn" class="btn btn-outline-light btn-sm">退出</button>
      </div>
    </div>
  </nav>
  <div class="container py-4">
    <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>
    <div class="card shadow-sm">
      <div class="card-header d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
          <span class="fw-bold">持仓</span>
          <button id="btnRefreshValuation" class="btn btn-sm btn-outline-primary">刷新估值</button>
        </div>
        <div class="text-muted small">双击代码跳转到图表</div>
      </div>
      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="table-light">
            <tr>
              <th>代码</th>
              <th class="text-end">股数</th>
              <th class="text-end">均价</th>
              <th class="text-end">最新价</th>
              <th class="text-end">市值</th>
              <th class="text-end">盈亏</th>
            </tr>
          </thead>
          <tbody id="holdingsBody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/common.js"></script>
  <script src="/static/js/portfolio.js"></script>
</body>
</html>
